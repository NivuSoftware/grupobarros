services:
  postgres:
    image: postgres:16-alpine
    container_name: barros-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: grupobarros
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - barros-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: barros-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - barros-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: barros-backend
    working_dir: /app
    volumes:
      - ./backend:/app:cached
      - /app/node_modules
      - /app/.next
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=grupobarros
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - FRONTEND_URL=http://localhost:5173
      - JWT_SECRET=cambia_esto_por_un_secreto_de_32_caracteres_o_mas
      - JWT_ISSUER=grupobarros-api
      - JWT_AUDIENCE=grupobarros-frontend
      - ACCESS_TOKEN_TTL_SECONDS=900
      - REFRESH_TOKEN_TTL_SECONDS=604800
    env_file:
      - ./backend/.env
    depends_on:
      mailhog:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - barros-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: barros-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:3001
    command: ["npm", "run", "dev", "--", "--host"]
    depends_on:
      - backend
    networks:
      - barros-network

volumes:
  postgres_data:

networks:
  barros-network:
    driver: bridge
