server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Compresión gzip
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff
    font/woff2;

  # Seguridad básica
  add_header X-Content-Type-Options  "nosniff"        always;
  add_header X-Frame-Options         "SAMEORIGIN"     always;
  add_header X-XSS-Protection        "1; mode=block"  always;
  add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

  # Proxy al backend Next.js (misma red Docker)
  location /api/ {
    proxy_pass         http://barros-backend:3001;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    client_max_body_size 15M;
  }

  # Uploads servidos por el backend
  location /uploads/ {
    proxy_pass       http://barros-backend:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    expires          180d;
    add_header       Cache-Control "public, max-age=15552000";
  }

  # Assets con hash → caché 1 año (inmutable)
  location ~* ^/assets/.*\.(js|css)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  # Imágenes y fuentes → caché 6 meses
  location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|woff|woff2|ttf|eot)$ {
    expires 180d;
    add_header Cache-Control "public, max-age=15552000";
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  # index.html → sin caché (siempre fresco para nuevos deploys)
  location = /index.html {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
