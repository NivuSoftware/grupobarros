# ─── HTTP → redirige todo a HTTPS ────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name grupobarros.com.ec www.grupobarros.com.ec;

    # Requerido por certbot para verificación del dominio
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://grupobarros.com.ec$request_uri;
    }
}


# ─── HTTPS principal ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name grupobarros.com.ec;

    ssl_certificate     /etc/letsencrypt/live/grupobarros.com.ec/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grupobarros.com.ec/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Seguridad
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header X-Frame-Options           "SAMEORIGIN"    always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Tamaño máximo de subida (comprobantes)
    client_max_body_size 15M;

    # Compresión gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        application/xml image/svg+xml
        font/woff font/woff2;

    # ── API → backend Next.js ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Uploads → backend ───────────────────────────────────────────────────
    location /uploads/ {
        proxy_pass       http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires          180d;
        add_header       Cache-Control "public, max-age=15552000";
    }

    # ── Frontend estático ────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
