# Configuración temporal HTTP-only (solo para certbot challenge)
# deploy.sh la usa ANTES de obtener el certificado SSL
server {
    listen 80;
    listen [::]:80;
    server_name grupobarros.com.ec;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
